name: App — PR Checks

on:
  pull_request:
    paths:
      - "app/**"
    branches:
      - main
  pull_request_target:
    types: [closed]    # cleanup ephemeral namespace on PR close/merge

permissions:
  id-token: write
  contents: read
  pull-requests: write

# One run per PR — cancel older runs on new push
concurrency:
  group: app-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────
  # Cleanup — runs when PR is closed/merged
  # Deletes the ephemeral pr-{N} namespace
  # ─────────────────────────────────────────
  cleanup:
    name: Cleanup PR namespace
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.DEV_ACCOUNT_ID }}:role/app-deploy-role
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name clevertap-dev --region us-east-1

      - name: Delete namespace
        run: |
          kubectl delete namespace pr-${{ github.event.pull_request.number }} --ignore-not-found
          echo "Deleted namespace pr-${{ github.event.pull_request.number }}"

  # ─────────────────────────────────────────
  # Security — runs first, fails fast
  # ─────────────────────────────────────────
  secret-scan:
    name: Gitleaks — secret scan
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so gitleaks scans all commits in the PR

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: Semgrep — SAST
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/dockerfile
            p/python
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ─────────────────────────────────────────
  # Lint + Unit Tests
  # ─────────────────────────────────────────
  test:
    name: Lint + Unit Tests
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    needs: [secret-scan]     # no point testing if secrets are leaked
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: app
        run: pip install -r requirements.txt ruff pytest

      - name: Lint (ruff)
        working-directory: app
        run: ruff check src/

      - name: Unit tests
        working-directory: app
        run: pytest src/ -v --tb=short

  # ─────────────────────────────────────────
  # Build + Scan + Push to ECR
  # ─────────────────────────────────────────
  build-and-push:
    name: Build → Trivy → ECR
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    needs: [secret-scan, sast, test]
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
      image-uri: ${{ steps.meta.outputs.uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.DEV_ACCOUNT_ID }}:role/app-deploy-role
          aws-region: us-east-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          TAG="sha-${{ github.sha }}"
          URI="${{ steps.ecr-login.outputs.registry }}/event-ingestion:${TAG}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "uri=${URI}" >> $GITHUB_OUTPUT

      - name: Trivy — filesystem scan (before build)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: app/
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table

      - name: Docker build
        run: |
          docker build \
            -t ${{ steps.meta.outputs.uri }} \
            -f app/Dockerfile \
            app/

      - name: Trivy — image scan (after build)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ steps.meta.outputs.uri }}
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table

      - name: Push to ECR
        run: docker push ${{ steps.meta.outputs.uri }}

  # ─────────────────────────────────────────
  # Deploy to ephemeral PR namespace in dev cluster
  # ─────────────────────────────────────────
  deploy-pr-env:
    name: Deploy → pr-${{ github.event.pull_request.number }}
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.DEV_ACCOUNT_ID }}:role/app-deploy-role
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name clevertap-dev --region us-east-1

      - name: Create namespace
        run: |
          kubectl create namespace pr-${{ github.event.pull_request.number }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Helm deploy to PR namespace
        run: |
          helm upgrade --install event-ingestion app/helm \
            --namespace pr-${{ github.event.pull_request.number }} \
            --set image.repository=${{ steps.ecr-login.outputs.registry }}/event-ingestion \
            --set image.tag=sha-${{ github.sha }} \
            --set ingress.host=pr-${{ github.event.pull_request.number }}.dev.clevertap.internal \
            --set env.APP_ENV=dev \
            --set externalSecret.enabled=false \
            --wait \
            --timeout 5m

      - name: Post preview URL as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '### Preview Environment Ready',
                '',
                `**URL:** http://pr-${{ github.event.pull_request.number }}.dev.clevertap.internal`,
                `**Image:** \`sha-${{ github.sha }}\``,
                `**Namespace:** \`pr-${{ github.event.pull_request.number }}\``,
                '',
                '_This environment will be deleted when the PR is closed._'
              ].join('\n')
            })
