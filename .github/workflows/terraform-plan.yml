name: Terraform Plan (PR)

# Runs on every PR push — posts plan as comment, never applies
# Gives reviewers visibility into what will change before merge

on:
  pull_request:
    paths:
      - "terraform/**"
    branches:
      - main

permissions:
  id-token: write    # required for OIDC
  contents: read
  pull-requests: write  # required to post PR comments

jobs:
  plan:
    name: Plan — dev-${{ matrix.region }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        region:
          - us-east-1
          - ap-south-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.DEV_ACCOUNT_ID }}:role/terraform-plan-role
          aws-region: ${{ matrix.region }}

      - name: Terraform Init
        id: init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=tf-state-dev-${{ matrix.region }}" \
            -backend-config="key=clevertap/terraform.tfstate" \
            -backend-config="region=${{ matrix.region }}" \
            -backend-config="dynamodb_table=tf-locks-dev" \
            -input=false

      - name: Terraform Validate
        id: validate
        working-directory: terraform
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: |
          terraform plan \
            -var-file="tfvars/dev/${{ matrix.region }}.tfvars" \
            -no-color \
            -input=false \
            -out=tfplan 2>&1 | tee plan-output.txt
        continue-on-error: true

      - name: Post Plan as PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('terraform/plan-output.txt', 'utf8');
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n\n... output truncated (too large for comment)'
              : planOutput;

            const body = `### Terraform Plan — \`dev/${{ matrix.region }}\`

            #### Init: \`${{ steps.init.outcome }}\`
            #### Validate: \`${{ steps.validate.outcome }}\`
            #### Plan: \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${truncated}
            \`\`\`

            </details>

            *Triggered by @${{ github.actor }} on \`${{ github.head_ref }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
