replicaCount: 5

ingress:
  host: "event-ingestion.prod.clevertap.internal"

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  minReplicas: 5
  maxReplicas: 50

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::333333333333:role/event-ingestion-prod"

externalSecret:
  secrets:
    - secretKey: KAFKA_BROKERS
      remoteKey: "/clevertap/prod/kafka-brokers"
    - secretKey: DB_PASSWORD
      remoteKey: "/clevertap/prod/db-password"

env:
  APP_ENV: "prod"
  AWS_REGION: "us-east-1"

# Spread pods across nodes and AZs for HA
tolerations: []

nodeSelector:
  capacity-type: "on-demand"   # critical service — never on spot

podDisruptionBudget:
  minAvailable: 3

canary:
  enabled: true
